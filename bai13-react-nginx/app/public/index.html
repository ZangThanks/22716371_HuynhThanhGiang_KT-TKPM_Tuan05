<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React App with Docker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        background: white;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
      }
      p {
        color: #666;
        font-size: 16px;
        margin-bottom: 20px;
      }
      .info {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 5px;
        margin-top: 20px;
        text-align: left;
      }
      .info h3 {
        color: #667eea;
        margin-bottom: 10px;
      }
      .info p {
        margin: 5px 0;
        font-family: monospace;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
