version: "3.8"

services:
  react-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: bai13-react
    networks:
      - bai13-network

  nginx:
    image: nginx:alpine
    container_name: bai13-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - react-app
    networks:
      - bai13-network

networks:
  bai13-network:
    driver: bridge
