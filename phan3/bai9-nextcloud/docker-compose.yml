version: "3.8"

services:
  nextcloud:
    image: nextcloud:latest
    container_name: bai9-nextcloud
    ports:
      - "80:80"
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin123
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      MYSQL_HOST: mariadb
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud123
    depends_on:
      - mariadb
      - redis
    networks:
      - nextcloud_network
    restart: unless-stopped

  mariadb:
    image: mariadb:latest
    container_name: bai9-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud123
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - nextcloud_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bai9-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nextcloud_network
    restart: unless-stopped

networks:
  nextcloud_network:
    driver: bridge

volumes:
  nextcloud_data:
  mariadb_data:
  redis_data:
