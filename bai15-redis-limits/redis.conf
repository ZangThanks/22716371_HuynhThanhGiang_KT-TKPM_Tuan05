# Redis configuration file for Docker

# Accept all connections
bind 0.0.0.0

# Default port
port 6379

# TCP keepalive
tcp-keepalive 300

# Daemonize: no (keep running in foreground for Docker)
daemonize no

# Loglevel
loglevel notice

# Log file (empty means stdout)
logfile ""

# Database count
databases 16

# Save to disk every 60 seconds if 1000 keys changed
save 60 1000

# Stop writes if unable to save
stop-writes-on-bgsave-error yes

# Compression
rdbcompression yes

# RDB file name
dbfilename dump.rdb

# RDB path
dir /data

# Memory limits and eviction policies
# Maximum memory allowed
maxmemory 256mb

# Eviction policy when max memory is reached
# - noeviction: return errors when memory limit is reached
# - allkeys-lru: evict any key according to LRU algorithm
# - allkeys-lfu: evict any key according to LFU algorithm
# - volatile-lru: evict keys with TTL set, LRU algorithm
# - volatile-lfu: evict keys with TTL set, LFU algorithm
# - allkeys-random: evict random keys
# - volatile-random: evict random keys with TTL
# - volatile-ttl: evict keys with TTL, shortest first
maxmemory-policy allkeys-lru

# Append-only file
appendonly yes
appendfilename "appendonly.aof"

# Keyspace stats
save ""
